services:
  mysql:
    image: mysql:8.4
    container_name: webvul-mysql
    environment:
      MYSQL_DATABASE: webvul_shop
      MYSQL_USER: webvul
      MYSQL_PASSWORD: webvul_pass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  proxy:
    image: caddy:2.8.4-alpine
    container_name: webvul-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped
    mem_limit: 64m

  app:
    build: .
    container_name: webvul-app
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: webvul_shop
      DB_USER: webvul
      DB_PASSWORD: webvul_pass
      UPLOAD_DIR: /data/uploads
      JAVA_OPTS: -Xms64m -Xmx160m -XX:MaxMetaspaceSize=64m -XX:+UseSerialGC
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/data/uploads
    mem_limit: 256m
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
  caddy_data:
  caddy_config:

