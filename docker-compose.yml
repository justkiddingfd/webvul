services:
  mysql:
    image: mysql:8.4
    container_name: webvul-mysql
    environment:
      MYSQL_DATABASE: webvul_shop
      MYSQL_USER: webvul
      MYSQL_PASSWORD: webvul_pass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  app:
    build: .
    container_name: webvul-app
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: webvul_shop
      DB_USER: webvul
      DB_PASSWORD: webvul_pass
      UPLOAD_DIR: /data/uploads
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/data/uploads
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:

